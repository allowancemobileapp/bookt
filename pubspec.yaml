name: bookt
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^3.11.0
  cloud_firestore: ^5.6.3
  firebase_auth: ^5.4.2
  csv: ^6.0.0
  flutter_bloc: ^9.0.0
  flutter_svg: ^2.0.7
  share_plus: ^10.1.4
  path_provider: ^2.1.2 
  shimmer: ^3.0.0
  audioplayers: ^6.1.2
  image_picker: ^0.8.7
  flutter_sound: ^9.2.13
  permission_handler: ^10.2.0
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  pdf: ^3.11.1
  printing: ^5.13.5
  google_sign_in: ^6.2.2
  file_saver: 0.2.14
  flutter_web_plugins:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # Package for generating icons
  flutter_launcher_icons: ^0.14.3

# Icon configuration
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_icon.png"
  web:
    generate: true
    image_path: "assets/icons/app_icon.png"
    background_color: "#ffffff"
    theme_color: "#6200EE"

flutter:
  assets:
    - assets/icons/csv_export.png
    - assets/icons/app_icon.png
    - assets/icons/app2.png

  uses-material-design: true